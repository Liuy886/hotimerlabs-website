<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">HotimerLabs 7-bar favicon</title>
  <desc id="desc">Rounded dark favicon using the 7-bar Balanced Wave H mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12191D"/>
      <stop offset="1" stop-color="#05090B"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="118" x2="0" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FB72"/>
      <stop offset="0.54" stop-color="#DDEB5D"/>
      <stop offset="1" stop-color="#BFD248"/>
    </linearGradient>
    <filter id="glow" x="-44%" y="-54%" width="188%" height="208%">
      <feGaussianBlur stdDeviation="5.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.86 0 0 0 0 0.93 0 0 0 0 0.31 0 0 0 0.48 0" result="limeGlow"/>
      <feMerge>
        <feMergeNode in="limeGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)"/>
  <rect x="29" y="29" width="454" height="454" rx="111" fill="none" stroke="#2A3035" stroke-width="2"/>
  <g fill="url(#lime)" filter="url(#glow)" transform="translate(256 256) scale(.98)">
    <rect x="-144" y="-72" width="24" height="144" rx="12"/>
    <rect x="-96" y="-124" width="24" height="248" rx="12"/>
    <rect x="-48" y="-92" width="24" height="184" rx="12"/>
    <rect x="-12" y="-38" width="24" height="76" rx="12"/>
    <rect x="24" y="-92" width="24" height="184" rx="12"/>
    <rect x="72" y="-124" width="24" height="248" rx="12"/>
    <rect x="120" y="-72" width="24" height="144" rx="12"/>
  </g>
</svg>
