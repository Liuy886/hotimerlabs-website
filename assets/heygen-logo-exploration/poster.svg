  <text x="120" y="184" fill="#8B8E88" font-size="18" font-weight="560" letter-spacing="0.12em" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif">HEYGEN / HYPERFRAMES DIRECTION BOARD</text>

