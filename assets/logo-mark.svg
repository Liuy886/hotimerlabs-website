<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">HotimerLabs 7-bar Balanced Wave H mark</title>
  <desc id="desc">A centered 7-bar Balanced Wave H mark formed only by seven vertical rounded waveform bars.</desc>
  <defs>
    <linearGradient id="lime" x1="0" y1="100" x2="0" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FB72"/>
      <stop offset="0.54" stop-color="#DDEB5D"/>
      <stop offset="1" stop-color="#BFD248"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-55%" width="190%" height="210%">
      <feGaussianBlur stdDeviation="6.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.86 0 0 0 0 0.93 0 0 0 0 0.31 0 0 0 0.46 0" result="limeGlow"/>
      <feMerge>
        <feMergeNode in="limeGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bar{fill:url(#lime);filter:url(#glow)}
    </style>
  </defs>
  <g transform="translate(256 256) scale(1.26)">
    <rect class="bar" x="-144" y="-72" width="24" height="144" rx="12"/>
    <rect class="bar" x="-96" y="-124" width="24" height="248" rx="12"/>
    <rect class="bar" x="-48" y="-92" width="24" height="184" rx="12"/>
    <rect class="bar" x="-12" y="-38" width="24" height="76" rx="12"/>
    <rect class="bar" x="24" y="-92" width="24" height="184" rx="12"/>
    <rect class="bar" x="72" y="-124" width="24" height="248" rx="12"/>
    <rect class="bar" x="120" y="-72" width="24" height="144" rx="12"/>
  </g>
</svg>
